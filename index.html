<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <title>Simulação de Redução - Gestão de Riscos</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Open Sans', Arial, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 500px;
      background: #ffffff;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 18px;
    }

    .logo-wrap img {
      width: 100%;
      max-width: 240px;
      height: auto;
      display: block;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 26px;
      color: #003A89;
      text-align: center;
      line-height: 1.25;
    }

    p {
      margin: 0 0 24px;
      color: #4b5563;
      line-height: 1.5;
      text-align: center;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 700;
      font-size: 14px;
    }

    input,
    select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
      background: #fff;
    }

    input:focus,
    select:focus {
      border-color: #003A89;
      box-shadow: 0 0 0 3px rgba(0, 58, 137, 0.12);
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #003A89;
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
    }

    button:hover {
      opacity: 0.95;
    }

    .resultado {
      margin-top: 22px;
      padding: 18px;
      border-radius: 12px;
      background: #eef4ff;
      border: 1px solid #cfe0ff;
    }

    .resultado strong {
      display: block;
      font-size: 14px;
      color: #003A89;
      margin-bottom: 6px;
    }

    .valor {
      font-size: 28px;
      font-weight: 800;
      color: #111827;
    }

    .erro {
      margin-top: 14px;
      color: #b91c1c;
      font-size: 14px;
      font-weight: 700;
    }

    .formula {
      margin-top: 10px;
      font-size: 13px;
      color: #4b5563;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="./Logo AV oficial sem fundo.png" alt="Logo AltaVista XP" />
    </div>

    <h1>Simulação de Redução - Gestão de Riscos</h1>
    <p>
      Escolha o tipo de cálculo e simule rapidamente a relação proporcional entre
      prêmio e capital segurado.
    </p>

    <div class="field">
      <label for="modo">Tipo de cálculo</label>
      <select id="modo" onchange="atualizarModo()">
        <option value="premio">Calcular novo prêmio</option>
        <option value="capital">Calcular novo capital segurado</option>
      </select>
    </div>

    <div class="field">
      <label for="valorBase1" id="labelBase1">Prêmio atual (R$)</label>
      <input type="number" id="valorBase1" placeholder="Ex: 150000" step="0.01" />
    </div>

    <div class="field">
      <label for="valorBase2" id="labelBase2">Capital segurado atual (R$)</label>
      <input type="number" id="valorBase2" placeholder="Ex: 2500000" step="0.01" />
    </div>

    <div class="field">
      <label for="valorVariavel" id="labelVariavel">Novo capital segurado (R$)</label>
      <input type="number" id="valorVariavel" placeholder="Ex: 2000000" step="0.01" />
    </div>

    <button id="botaoCalcular" onclick="calcular()">Calcular novo prêmio</button>

    <div id="erro" class="erro"></div>

    <div id="resultado" class="resultado" style="display: none;">
      <strong id="tituloResultado">Novo prêmio estimado</strong>
      <div id="valorResultado" class="valor">R$ 0,00</div>
      <div id="formulaResultado" class="formula"></div>
    </div>
  </div>

  <script>
    function formatarMoeda(valor) {
      return new Intl.NumberFormat('pt-BR', {
        style: 'currency',
        currency: 'BRL'
      }).format(valor);
    }

    function atualizarModo() {
      const modo = document.getElementById('modo').value;
      const labelVariavel = document.getElementById('labelVariavel');
      const inputVariavel = document.getElementById('valorVariavel');
      const botao = document.getElementById('botaoCalcular');
      const tituloResultado = document.getElementById('tituloResultado');
      const resultado = document.getElementById('resultado');
      const erro = document.getElementById('erro');

      erro.textContent = '';
      resultado.style.display = 'none';

      if (modo === 'premio') {
        labelVariavel.textContent = 'Novo capital segurado (R$)';
        inputVariavel.placeholder = 'Ex: 2000000';
        botao.textContent = 'Calcular novo prêmio';
        tituloResultado.textContent = 'Novo prêmio estimado';
      } else {
        labelVariavel.textContent = 'Novo prêmio desejado (R$)';
        inputVariavel.placeholder = 'Ex: 120000';
        botao.textContent = 'Calcular novo capital segurado';
        tituloResultado.textContent = 'Novo capital segurado estimado';
      }
    }

    function calcular() {
      const modo = document.getElementById('modo').value;
      const valorBase1 = parseFloat(document.getElementById('valorBase1').value);
      const valorBase2 = parseFloat(document.getElementById('valorBase2').value);
      const valorVariavel = parseFloat(document.getElementById('valorVariavel').value);
      const erro = document.getElementById('erro');
      const resultado = document.getElementById('resultado');
      const valorResultado = document.getElementById('valorResultado');
      const formulaResultado = document.getElementById('formulaResultado');

      erro.textContent = '';
      resultado.style.display = 'none';

      if (!valorBase1 || !valorBase2 || !valorVariavel) {
        erro.textContent = 'Preencha todos os campos para calcular.';
        return;
      }

      if (valorBase1 <= 0 || valorBase2 <= 0 || valorVariavel <= 0) {
        erro.textContent = 'Os valores devem ser maiores que zero.';
        return;
      }

      let calculo = 0;

      if (modo === 'premio') {
        calculo = (valorBase1 * valorVariavel) / valorBase2;
        formulaResultado.textContent =
          'Fórmula: prêmio atual × novo capital segurado ÷ capital segurado atual';
      } else {
        calculo = (valorBase2 * valorVariavel) / valorBase1;
        formulaResultado.textContent =
          'Fórmula: capital segurado atual × novo prêmio desejado ÷ prêmio atual';
      }

      valorResultado.textContent = formatarMoeda(calculo);
      resultado.style.display = 'block';
    }

    atualizarModo();
  </script>
</body>
</html>
