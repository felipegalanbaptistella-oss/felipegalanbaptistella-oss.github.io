<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <title>Calculadora de Cobertura</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Open Sans', Arial, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 460px;
      background: #ffffff;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    }
    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 18px;
    }
    .logo-wrap img {
      width: 100%;
      max-width: 240px;
      height: auto;
      display: block;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      color: #003A89;
    }
    p {
      margin: 0 0 24px;
      color: #4b5563;
      line-height: 1.5;
    }
    .field {
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 700;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
    }
    input:focus {
      border-color: #003A89;
      box-shadow: 0 0 0 3px rgba(0, 58, 137, 0.12);
    }
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #003A89;
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
    }
    button:hover {
      opacity: 0.95;
    }
    .resultado {
      margin-top: 22px;
      padding: 18px;
      border-radius: 12px;
      background: #eef4ff;
      border: 1px solid #cfe0ff;
    }
    .resultado strong {
      display: block;
      font-size: 14px;
      color: #003A89;
      margin-bottom: 6px;
    }
    .valor {
      font-size: 28px;
      font-weight: 800;
      color: #111827;
    }
    .erro {
      margin-top: 14px;
      color: #b91c1c;
      font-size: 14px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="./Logo AV oficial sem fundo.png" alt="Logo AltaVista XP" />
    </div>
    <h1>Calculadora de Cobertura</h1>
    <p>Preencha os campos abaixo para calcular o valor proporcional de uma nova cobertura.</p>

    <div class="field">
      <label for="valorPago">Valor pago atual (R$)</label>
      <input type="number" id="valorPago" placeholder="Ex: 150000" step="0.01" />
    </div>

    <div class="field">
      <label for="coberturaAtual">Cobertura atual (R$)</label>
      <input type="number" id="coberturaAtual" placeholder="Ex: 2500000" step="0.01" />
    </div>

    <div class="field">
      <label for="novaCobertura">Nova cobertura (R$)</label>
      <input type="number" id="novaCobertura" placeholder="Ex: 2000000" step="0.01" />
    </div>

    <button onclick="calcular()">Calcular</button>

    <div id="erro" class="erro"></div>

    <div id="resultado" class="resultado" style="display:none;">
      <strong>Valor estimado a pagar</strong>
      <div id="valorResultado" class="valor">R$ 0,00</div>
    </div>
  </div>

  <script>
    function formatarMoeda(valor) {
      return new Intl.NumberFormat('pt-BR', {
        style: 'currency',
        currency: 'BRL'
      }).format(valor);
    }

    function calcular() {
      const valorPago = parseFloat(document.getElementById('valorPago').value);
      const coberturaAtual = parseFloat(document.getElementById('coberturaAtual').value);
      const novaCobertura = parseFloat(document.getElementById('novaCobertura').value);
      const erro = document.getElementById('erro');
      const resultado = document.getElementById('resultado');
      const valorResultado = document.getElementById('valorResultado');

      erro.textContent = '';
      resultado.style.display = 'none';

      if (!valorPago || !coberturaAtual || !novaCobertura) {
        erro.textContent = 'Preencha todos os campos para calcular.';
        return;
      }

      if (coberturaAtual === 0) {
        erro.textContent = 'A cobertura atual não pode ser zero.';
        return;
      }

      const novoValor = (valorPago * novaCobertura) / coberturaAtual;
      valorResultado.textContent = formatarMoeda(novoValor);
      resultado.style.display = 'block';
    }
  </script>
</body>
</html>
